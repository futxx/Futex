<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Canais Ao Vivo</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            color: #00ff88;
            text-transform: uppercase;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        /* Container do Player */
        .player-container {
            width: 100%;
            max-width: 800px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 2px solid #222;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: auto;
            aspect-ratio: 16/9;
        }

        /* Mensagem de Erro Personalizada */
        .player-error-msg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff4a4a;
            font-weight: bold;
            z-index: 10;
            display: none;
            text-align: center;
            padding: 20px;
        }

        /* Filtros de Categoria */
        .filter-container {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #333;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #00ff88;
            background-color: #1a3a2a;
            color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* Grade de Canais */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        /* Card do Canal */
        .channel-card {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .channel-card:hover {
            transform: translateY(-4px);
            border-color: #00ff88;
            background-color: #252525;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.15);
        }

        .channel-card.active {
            border-color: #00ff88;
            background-color: #1a3a2a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .channel-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: #000;
            padding: 5px;
            border: 1px solid #222;
        }

        .channel-name {
            font-size: 0.95rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>Canais Ao Vivo</h1>

    <div class="player-container">
        <!-- Banner de aviso de erro se a stream cair -->
        <div id="error-screen" class="player-error-msg">
            <p style="font-size: 1.2rem; margin-bottom: 10px;">⚠️ Canal Temporariamente Fora do Ar</p>
            <p style="font-size: 0.9rem; color: #aaa;">Tente selecionar outro canal ou aguarde alguns instantes.</p>
        </div>

        <video 
            id="live-player" 
            class="video-js vjs-default-skin vjs-big-play-centered" 
            controls 
            preload="auto" 
            data-setup='{}'>
            <source src="https://speed.megafilmeshd9.com/speed-3/playlist/7717654.m3u8?jw=1&auto_quality=0" type="application/x-mpegURL">
            Seu navegador não suporta este formato de vídeo.
        </video>
    </div>

    <!-- Botões de Filtragem por Categoria -->
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterChannels('all', this)">Todos</button>
        <button class="filter-btn" onclick="filterChannels('premiere', this)">Premiere</button>
        <button class="filter-btn" onclick="filterChannels('sportv', this)">SporTV</button>
        <button class="filter-btn" onclick="filterChannels('espn', this)">ESPN</button>
    </div>

    <div class="channels-grid">

            <div class="channel-name">Premiere Clubes 4K</div>
        </div>

        <div class="channel-card" data-category="premiere" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/fallback/7717651.m3u8', this)">
            <img class="channel-logo" src="https://i.ibb.co/CQ0gFRj/pfc2.png" alt="Premiere 2 HD">
            <div class="channel-name">Premiere 2 HD</div>
        </div>

        <div class="channel-card" data-category="premiere" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/7717643.m3u8?jw=1&auto_quality=0', this)">
            <img class="channel-logo" src="https://i.ibb.co/pwDkSGX/pfc5.png" alt="Premiere 5 FHD">

        </div>

        <div class="channel-card" data-category="premiere" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/fallback/7717640.m3u8', this)">
            <img class="channel-logo" src="https://i.ibb.co/fQMJ3Y5/pfc6.png" alt="Premiere 6 FHD">
            <div class="channel-name">Premiere 6 FHD</div>
        </div>

        <div class="channel-card" data-category="premiere" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/fallback/7717637.m3u8', this)">
            <img class="channel-logo" src="https://i.ibb.co/c865zPB/pfc7.png" alt="Premiere 7 FHD">
            <div class="channel-name">Premiere 7 FHD</div>
        </div>

        <div class="channel-card" data-category="premiere" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/7717633.m3u8?jw=1&auto_quality=0', this)">
            <img class="channel-logo" src="https://i.ibb.co/F52jGZb/pfc8.png" alt="Premiere 8 FHD">

        <!-- ================= SPORTV (data-category="sportv") ================= -->
        <div class="channel-card" data-category="sportv" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/fallback/7717824.m3u8', this)">

        <div class="channel-card" data-category="sportv" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/fallback/7717820.m3u8', this)">
            <img class="channel-logo" src="https://i.ibb.co/MkYYHQzT/sportv2.png" alt="SporTV 2 HD">

        </div>

        <div class="channel-card" data-category="sportv" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/fallback/7717813.m3u8', this)">
            <img class="channel-logo" src="https://i.ibb.co/C5121SkN/sportv3.png" alt="SporTV 3 HD">

        <!-- ================= ESPN (data-category="espn") ================= -->

        </div>

        <div class="channel-card" data-category="espn" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/7717308.m3u8?jw=1&auto_quality=0', this)">

        <div class="channel-card" data-category="espn" onclick="changeChannel('https://speed.megafilmeshd9.com/speed-3/playlist/7717293.m3u8?jw=1&auto_quality=0', this)">
            <img class="channel-logo" src="https://i.ibb.co/gb5Yfvjk/espn6.png" alt="ESPN 6 HD">

        </div>

    </div>

    <!-- Script Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // Inicializa o player de vídeo
        const player = videojs('live-player');
        const errorScreen = document.getElementById('error-screen');

        // Monitoramento de Erros do Player
        player.on('error', function() {
            errorScreen.style.display = 'flex';
        });

        // Função para trocar de canal ao clicar
        function changeChannel(streamUrl, cardElement) {
            // Oculta a tela de erro antes de tentar carregar o novo canal
            errorScreen.style.display = 'none';

            // Altera a fonte do player
            player.src({
                src: streamUrl,
                type: 'application/x-mpegURL'
            });

            // Tenta dar play tratando a política de autoplay do navegador
            const playPromise = player.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Reprodução iniciada com sucesso
                }).catch(error => {
                    console.log("Autoplay bloqueado. Iniciando no modo silencioso.");
                    player.muted(true);
                    player.play();
                });
            }

            // Atualiza a classe ativa nos cards para destacar o canal atual
            document.querySelectorAll('.channel-card').forEach(card => {
                card.classList.remove('active');
            });
            cardElement.classList.add('active');
        }

        // Função para filtrar os canais pelas abas
        function filterChannels(category, btnElement) {
            // Atualiza a classe ativa nos botões de filtro
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            btnElement.classList.add('active');

            // Exibe ou oculta os canais de acordo com a categoria selecionada
            document.querySelectorAll('.channel-card').forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                
                if (category === 'all' || cardCategory === category) {
                    card.style.display = 'flex'; // Mostra o canal
                } else {
                    card.style.display = 'none'; // Esconde o canal
                }
            });
        }
    </script>

</body>
</html>
